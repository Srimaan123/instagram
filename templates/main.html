<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap&family=Edu+NSW+ACT+Cursive:wght@400..700&display=swap&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @media (min-width:500px) {
            .main{
                display: grid;
                grid-template-columns: 1fr 10fr;
                grid-template-rows: 1fr 10fr;
                grid-template-areas: 
                "navigation content"
                "navigation content";
            }
            .header{
                display: none;
            }
            .content{
                grid-area: content;
            }
            .navigation{
                grid-area: navigation;
            }
        }
    </style>
</head>
<body>
    <div class="main w-full min-h-dvh">
        <div class="header border-b-2 border-gray-200 flex items-center">
            
        </div>
        <div class="content"></div>
        <div class="navigation flex flex-col items-center">
            <div class="icon grow">
                <i class="fab fa-instagram text-5xl "></i>
            </div>
            <div class="icons flex flex-col gap-4 pl-4 pr-4">
                <i class="fas fa-heart text-red-400 text-2xl"></i>
                <i class="far fa-plus text-2xl"></i>
                <i class="fas fa-paper-plane text-2xl"></i>
            </div>
            <div class="icons grow flex flex-col justify-end gap-4 pb-4">
                <i class="fas fa-bars text-2xl"></i>
                <i class="fas fa-gear text-2xl"></i>
            </div>
        </div>
    </div>
</body>
</html>
